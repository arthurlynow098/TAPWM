<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 8 - Arrays no JavaScript</title>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            padding: 30px 40px;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
        }

        h2 {
            color: #444;
            font-size: 18px;
            margin-top: 20px;
        }

        p {
            color: #666;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .exercicio-box {
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        input {
            padding: 10px;
            font-size: 16px;
            width: calc(100% - 24px); 
            margin-bottom: 15px;
            border: 2px solid #ccc;
            border-radius: 6px;
        }

        input.texto-centro {
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        input:focus {
            outline: none;
            border-color: #007bff;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
            width: 100%;
        }

        button:hover {
            background-color: #0056b3;
        }

        .resultado-box {
            margin-top: 15px;
            padding: 15px;
            background-color: #e9ecef;
            border-radius: 6px;
            border-left: 4px solid #28a745;
            font-family: monospace;
            font-size: 15px;
            color: #333;
            display: none; 
        }
        
        .palavra-item {
            margin-bottom: 5px;
            font-weight: bold;
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>Resoluções - Atividade 8</h1>

        <div class="exercicio-box">
            <h2>Exercício 1: Cálculos com Array</h2>
            <p>Digite 3 números separados por vírgula (Ex: 2, 4, 6):</p>
            
            <input type="text" id="inputNumeros" placeholder="Ex: 2, 4, 6">
            <button onclick="executarEx1()">Calcular (Usando Apply)</button>

            <div id="resultadoEx1" class="resultado-box"></div>
        </div>

        <div class="exercicio-box">
            <h2>Exercício 2: Gerador de Palavras</h2>
            <p>Digite exatamente 5 letras para gerar 10 combinações:</p>
            
            <input type="text" id="inputLetras" class="texto-centro" maxlength="5" placeholder="Ex: ABCDE">
            <button onclick="executarEx2()">Gerar Palavras (Usando Apply e Push)</button>

            <div id="resultadoEx2" class="resultado-box"></div>
        </div>
    </div>

    <script>
        function realizarCalculos(n1, n2, n3) {
            const soma = n1 + n2 + n3;
            const quadPrimeiro = n1 * n1;
            const quadSegundo = n2 * n2;
            return `A soma dos três números é: <strong>${soma}</strong><br>O quadrado do primeiro é: <strong>${quadPrimeiro}</strong><br>O quadrado do segundo é: <strong>${quadSegundo}</strong>`;
        }

        function exercicio1(arrayNumeros) {
            if (arrayNumeros.length !== 3 || arrayNumeros.includes(NaN)) {
                return "Por favor, forneça exatamente 3 números válidos.";
            }
            return realizarCalculos.apply(null, arrayNumeros);
        }

        function executarEx1() {
            const textoDigitado = document.getElementById("inputNumeros").value;
            
            const arrayDeNumeros = textoDigitado.split(',').map(num => Number(num.trim()));
            
            const resposta = exercicio1(arrayDeNumeros);
            
            const divResultado = document.getElementById("resultadoEx1");
            divResultado.innerHTML = resposta;
            divResultado.style.display = "block"; 
        }

        function exercicio2(letras) {
            if (letras.length !== 5) {
                return ["Erro: Digite exatamente 5 letras."];
            }

            const palavrasGeradas = [];

            while (palavrasGeradas.length < 10) {
                let letrasEmbaralhadas = [...letras].sort(() => 0.5 - Math.random());
                let novaPalavra = "".concat.apply("", letrasEmbaralhadas);

                if (!palavrasGeradas.includes(novaPalavra)) {
                    palavrasGeradas.push(novaPalavra);
                }
            }

            return palavrasGeradas;
        }

        function executarEx2() {
            const textoDigitado = document.getElementById("inputLetras").value.toUpperCase();
            
            if (textoDigitado.length !== 5) {
                alert("Atenção: Você precisa digitar exatamente 5 letras!");
                return;
            }

            const arrayDeLetras = textoDigitado.split('');
            const resultado = exercicio2(arrayDeLetras);
            
            const divResultado = document.getElementById("resultadoEx2");
            divResultado.innerHTML = ""; 
            
            resultado.forEach((palavra, index) => {
                divResultado.innerHTML += `<div class="palavra-item">${index + 1}. ${palavra}</div>`;
            });
            
            divResultado.style.display = "block"; 
        }
    </script>
</body>
</html>
